<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Herramientas de Negocio</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: #f4f7f6;
margin: 0;
padding: 40px;
}
.container {
max-width: 800px;
margin: 0 auto;
text-align: center;
}
h1 {
color: #1f2937;
margin-bottom: 30px;
}
.tools-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
}
.tool-card {
background: white;
padding: 30px;
border-radius: 15px;
text-decoration: none;
color: #333;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
transition: transform 0.2s;
}
.tool-card:hover {
transform: translateY(-5px);
box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}
.tool-icon {
font-size: 3rem;
margin-bottom: 15px;
}
.tool-card h2 {
margin: 10px 0;
color: #3b82f6;
}
.tool-card p {
color: #6b7280;
}
</style>
</head>
<body>
<div class="container">
<h1>🎯 Mis Herramientas de Negocio</h1>
<div class="tools-grid">
<a href="index.html" class="tool-card">
<div class="tool-icon">💰</div>
<h2>Calculadora Financiera</h2>
<p>ROI, intereses, punto de equilibrio y más</p>
</a>
<a href="generador.html" class="tool-card">
<div class="tool-icon">📄</div>
<h2>Generador de CV y Transcripciones</h2>
<p>Crea currículums profesionales y transcripciones APA</p>
</a>
<a href="proveedores.html" class="tool-card" style="display:none;">
<div class="tool-icon">📦</div>
<h2>Portal de Proveedores</h2>
<p>Gestiona tus proveedores</p>
</a>
</div>
</div>
</body>
</html>
